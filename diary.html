     <section id="diary" class="section">
            <h2>Дневник самочувствия</h2>

            <form id="appointmentForm">
                <div class="form-group">
                    <label>Дата и время</label>
                    <input type="datetime-local">
                </div>
                <div class="form-group">
                    <label>Уровень боли (1–10)</label>
                    <input type="range" min="1" max="10" value="3">
                </div>
                <div class="form-group">
                    <label>Отёчность</label>
                    <select>
                        <option>Отсутствует</option>
                        <option>Лёгкая</option>
                        <option>Умеренная</option>
                        <option>Сильная</option>
                    </select>
                    <div class="form-group">
                    <label for="username">Описать самочувствие</label>
                    <input type="text">
                    <button type="submit">Cохранить</button>
                </div>
        </section>


<script>
 document.getElementById('appointmentForm').addEventListener('submit', function(e) {
 e.preventDefault();
 alert('Запись сохранилась');
 this.reset();
});
</script>
